// NEW FUNCTION
async function checkUrlForSong(){
  const params = new URLSearchParams(window.location.search);
  const idParam = params.get('id');
  const songQuery = params.get('song');

  // Prefer direct id link if provided
  if(idParam){
    // try to find the song in the cached list
    const song = allSongsFlat.find(s=>s.id===idParam);
    if(song){ loadAndPlay(song, allSongsFlat, allSongsFlat.indexOf(song)); openMaxPlayer(); return; }
    // if not cached yet, continue to search by name (fallback)
  }

  if(!songQuery) return; // no song param — nothing to do

  document.getElementById('activeQueryLabel').textContent = `Opening "${songQuery}"…`;

  try{
    const songs = await fetchSongs(songQuery);
    if(!songs.length){ toast('Song from link not found.'); return; }

    // optional ?artist= param helps pick the right match when multiple songs share a name
    const artistParam = params.get('artist');
    let match = songs[0];
    if(artistParam){
      const found = songs.find(s => getArtist(s).toLowerCase().includes(artistParam.toLowerCase()));
      if(found) match = found;
    }

    allSongsFlat = [...allSongsFlat, ...songs];
    const idx = songs.indexOf(match);
    loadAndPlay(match, songs, idx);
    openMaxPlayer(); // open maximized view
  }catch(e){
    toast('Could not load song from link — check your connection.');
  }
}

// =================================================================================
// RECOMMENDATION ZONE — renders "Continue Listening" + the taste-engine rails
// =================================================================================
async function renderRecommendationZone(){
  recommendationZone.innerHTML='';

  // ---- Continue Listening: merges actual plays + searched songs, most recent first ----
  const recentSongs = [];
  const seenIds = new Set();
  const timeline = [
    ...playLog.map(p=>({id:p.songId, ts:p.ts})),
    ...searchLog.flatMap(entry=>(entry.songIds||[]).map(id=>({id, ts:entry.ts}))),
  ].sort((a,b)=>b.ts-a.ts);
  for(const {id} of timeline){
    if(seenIds.has(id)) continue;
    const found = allSongsFlat.find(s=>s.id===id);
    if(found){ recentSongs.push(found); seenIds.add(id); }
    if(recentSongs.length>=10) break;
  }
  if(recentSongs.length){
    const block = document.createElement('div');
    block.className='home-block';
    block.innerHTML=`
      <div class="section-header">
        <div class="section-label"><div class="dot"></div><h2>⏪ Continue Listening</h2></div>
        <span class="section-count">${recentSongs.length} tracks</span>
      </div>
      <div class="cards-row" id="rail-continue"></div>`;
    recommendationZone.appendChild(block);
    renderGrid(recentSongs.slice(0,10), block.querySelector('#rail-continue'));
  }

  if(!hasSignal()) return; // nothing learned yet — skip personalized rails entirely

  const plan = buildRecommendationPlan();
  lastRecSignature = computeRecSignature();
  if(!plan.rails.length) return;

  // ---- Taste strip: shows what the engine has learned, transparently ----
  if(plan.tastePills.length){
    const stripWrap = document.createElement('div');
    stripWrap.className='home-block rec-block';
    stripWrap.innerHTML=`
      <div class="section-header" style="margin-bottom:0.8rem;">
        <div class="section-label"><div class="dot"></div><h2>🧠 Tuned to your taste</h2></div>
      </div>
      <div class="taste-strip" id="tasteStrip"></div>`;
    recommendationZone.appendChild(stripWrap);
    const strip = stripWrap.querySelector('#tasteStrip');
    plan.tastePills.forEach(p=>{
      const pill=document.createElement('div');
      pill.className='taste-pill';
      pill.innerHTML=`<span>${esc(p.label)}</span><span class="tp-bar" style="--w:${p.pct}%"></span>`;
      strip.appendChild(pill);
    });
  }

  // ---- One rail per plan entry, fetched in parallel, rendered as it arrives ----
  const railEls = plan.rails.map(rail=>{
    const block=document.createElement('div');
    block.className='home-block rec-block';
    block.innerHTML=`
      <div class="section-header">
        <div class="section-label" style="flex-direction:column;align-items:flex-start;gap:0;">
          <div style="display:flex;align-items:center;gap:0.6rem;"><div class="dot"></div><h2>${esc(rail.title)}</h2></div>
          <div class="section-sub">${esc(rail.sub)}</div>
        </div>
        <span class="section-count" data-count></span>
      </div>
      <div class="cards-row" data-rail></div>`;
    recommendationZone.appendChild(block);
    block.querySelector('[data-rail]').innerHTML = `<div class="rail-loader">${'<div class="rail-skel"></div>'.repeat(5)}</div>`;
    return {rail, block};
  });

  await Promise.all(railEls.map(async ({rail,block})=>{
    const railTarget = block.querySelector('[data-rail]');
    const countTarget = block.querySelector('[data-count]');
    try{
      // fan out the generated discovery queries, merge + dedupe results
      const batches = await Promise.all(rail.queries.map(q=>fetchSongs(q).catch(()=>[])));
      const merged = new Map();
      batches.forEach((songs,bi)=>{
        songs.slice(0,8).forEach(s=>{ if(!merged.has(s.id)) merged.set(s.id, s); });
      });
      let combined = [...merged.values()];
      // light shuffle so the rail doesn't always echo query order exactly
      combined = combined.sort(()=>Math.random()-0.5).slice(0,12);
      if(!combined.length){ block.remove(); return; }
      allSongsFlat=[...allSongsFlat, ...combined];
      renderGrid(combined, railTarget);
      countTarget.textContent = `${combined.length} tracks`;
    }catch(e){
      railTarget.innerHTML = '<div class="status-card">Could not load this rail.</div>';
    }
  }));
}

let searchRequestId = 0;
async function runSearch(query){
  const q=(query||'').trim();
  if(!q) return;
  closeSuggestions();
  if(q.length < 2){
    // too short to be meaningful — avoid noisy API calls and noisy taste signal
    document.getElementById('activeQueryLabel').textContent='Keep typing…';
    return;
  }
  activeQuery=q;
  addToHistory(q);
  document.getElementById('activeQueryLabel').textContent=`Results for: "${q}"`;
  document.getElementById('resultsCountLabel').textContent='Searching…';
// AFTER
searchResultsGrid.innerHTML = md3LoaderHTML('Fetching tracks…');
  resultsSection.classList.add('visible');
  document.getElementById('historySection').classList.remove('visible');
  homeView.style.display='none';

  const reqId = ++searchRequestId; // guards against a slower earlier request overwriting a newer one
  try{
    const songs=await fetchSongs(q);
    if(reqId !== searchRequestId) return; // a newer search already superseded this one
    renderGrid(songs,searchResultsGrid);
    resultsBadge.textContent=`${songs.length} tracks`;
    document.getElementById('resultsCountLabel').textContent=`${songs.length} results`;
    allSongsFlat=[...allSongsFlat, ...songs];
    currentIndex=0;

    // feed the taste engine — this is what powers the home-screen recommendations
    recordSearchSignal(q, songs);
 // AFTER
}catch(err){
  if(reqId !== searchRequestId) return;
  lastFailedQuery = q;
  md3ShowError('No connection — will retry when back online');
  document.getElementById('resultsCountLabel').textContent='Error';
  recordSearchSignal(q, []);
}
}

// =================================================================================
// SEARCH SUGGESTIONS — typeahead dropdown
// =================================================================================
// Suggestions are assembled from three sources, each tagged so the user can see
// *why* a suggestion is shown:
//   1. Past search queries (exact history) — tag "recent"
//   2. Scored raw search terms from the taste profile — tag "you search this"
//   3. Known artist names (and aliases) from the knowledge graph — tag "artist"
// All three are filtered by substring match against what's currently typed,
// then ranked: history match > weighted term match > artist match, deduped by
// lowercase text so the same suggestion never appears twice.
const suggestDropdown = document.getElementById('suggestDropdown');
let suggestActiveIndex = -1;
let currentSuggestions = [];

function buildSuggestions(typed){
  const q = typed.toLowerCase();
  if(!q) return [];
  const seen = new Set();
  const out = [];

  // 1. History — exact past queries containing what's typed
  historyArr.forEach(h=>{
    const key = h.toLowerCase();
    if(key.includes(q) && !seen.has(key)){ seen.add(key); out.push({text:h, tag:'recent', score:100}); }
  });

  // 2. Raw search terms from the taste profile, weighted — surfaces things like
  // "wedding" -> "wedding songs" even if it was only ever part of a longer query
  topEntries(tasteProfile.rawTerms, 12).forEach(([term,weight])=>{
    if(term.includes(q) && q.length>=2){
      const suggestion = `${term} songs`;
      const key = suggestion.toLowerCase();
      if(!seen.has(key)){ seen.add(key); out.push({text:suggestion, tag:'you search this', score:weight}); }
    }
  });

  // 3. Known artists (by canonical name or alias) matching what's typed
  Object.keys(ARTIST_GRAPH).forEach(name=>{
    const aliasHit = ARTIST_GRAPH[name].aliases.some(a=>a.includes(q));
    if((name.toLowerCase().includes(q) || aliasHit)){
      const suggestion = `${name} hits`;
      const key = suggestion.toLowerCase();
      if(!seen.has(key)){ seen.add(key); out.push({text:suggestion, tag:'artist', score: topArtistsLookup()[name] ? 60+topArtistsLookup()[name] : 40}); }
    }
  });

  return out.sort((a,b)=>b.score-a.score).slice(0,7);
}

function topArtistsLookup(){ return tasteProfile.artists; }

function highlightMatch(text, typed){
  const idx = text.toLowerCase().indexOf(typed.toLowerCase());
  if(idx===-1) return esc(text);
  return esc(text.slice(0,idx)) + '<b>' + esc(text.slice(idx,idx+typed.length)) + '</b>' + esc(text.slice(idx+typed.length));
}

const SUGGEST_ICONS = {
  recent: '<path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6a7 7 0 1 1 2.06 4.94l-1.42 1.41A9 9 0 1 0 13 3zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8z"/>',
  'you search this': '<path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-9.09 9.08-4-4L2 16.99z"/>',
  artist: '<path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>',
};

function renderSuggestions(){
  if(!currentSuggestions.length){ suggestDropdown.classList.remove('visible'); suggestDropdown.innerHTML=''; return; }
  const typed = searchInput.value.trim();
  suggestDropdown.innerHTML = currentSuggestions.map((s,i)=>`
    <div class="suggest-item${i===suggestActiveIndex?' kbd-active':''}" data-idx="${i}">
      <svg viewBox="0 0 24 24">${SUGGEST_ICONS[s.tag]||SUGGEST_ICONS.recent}</svg>
      <span class="suggest-text">${highlightMatch(s.text, typed)}</span>
      <span class="suggest-tag">${esc(s.tag)}</span>
    </div>`).join('');
  suggestDropdown.classList.add('visible');
  suggestDropdown.querySelectorAll('.suggest-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const idx = +el.dataset.idx;
      chooseSuggestion(idx);
    });
  });
}

function chooseSuggestion(idx){
  const s = currentSuggestions[idx];
  if(!s) return;
  searchInput.value = s.text;
  closeSuggestions();
  runSearch(s.text);
}

function closeSuggestions(){
  suggestActiveIndex = -1;
  currentSuggestions = [];
  suggestDropdown.classList.remove('visible');
  suggestDropdown.innerHTML='';
}

document.addEventListener('click',e=>{
  if(!document.getElementById('searchWrap').contains(e.target)) closeSuggestions();
});

// =================================================================================
// SEARCH INPUT WIRING — live debounced search + typeahead suggestions
// =================================================================================
let liveSearchTimer = null;
searchForm.addEventListener('submit',e=>{
  e.preventDefault();
  clearTimeout(liveSearchTimer);
  closeSuggestions();
  const v=searchInput.value.trim();
  if(v) runSearch(v);
});
searchInput.addEventListener('input',()=>{
  const v=searchInput.value.trim();
  clearTimeout(liveSearchTimer);
  if(!v){ showHome(); closeSuggestions(); return; }

  // refresh suggestion dropdown immediately (no debounce needed — it's local data, no network)
  currentSuggestions = buildSuggestions(v);
  suggestActiveIndex = -1;
  renderSuggestions();

  // debounce the actual network search so we don't fire a request on every keystroke
  liveSearchTimer = setTimeout(()=>{ runSearch(v); }, 450);
});
searchInput.addEventListener('keydown',e=>{
  if(!currentSuggestions.length) return;
  if(e.key==='ArrowDown'){ e.preventDefault(); suggestActiveIndex = Math.min(currentSuggestions.length-1, suggestActiveIndex+1); renderSuggestions(); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); suggestActiveIndex = Math.max(0, suggestActiveIndex-1); renderSuggestions(); }
  else if(e.key==='Enter' && suggestActiveIndex>=0){ e.preventDefault(); clearTimeout(liveSearchTimer); chooseSuggestion(suggestActiveIndex); }
  else if(e.key==='Escape'){ closeSuggestions(); }
});
searchInput.addEventListener('focus',()=>{
  const v=searchInput.value.trim();
  if(v){ currentSuggestions = buildSuggestions(v); renderSuggestions(); }
});



// =================================================================================
// HISTORY (chips row)
// =================================================================================
function addToHistory(q){
  if(!q)return;
  historyArr=[q,...historyArr.filter(h=>h.toLowerCase()!==q.toLowerCase())].slice(0,MAX_HIST);
  renderHistory();
}
function renderHistory(){
  const qh=document.getElementById('queryHistory');
  qh.innerHTML='';
  historyArr.forEach(q=>{
    const c=document.createElement('button');
    c.type='button';
    c.className=`chip ripple-host${q.toLowerCase()===activeQuery.toLowerCase()?' active':''}`;
    c.textContent=q;
    c.onclick=()=>{ searchInput.value=q; runSearch(q); };
    addRipple(c);
    qh.appendChild(c);
  });
}

function scrollToSection(id, e){
  if(e){ e.preventDefault(); }
  showHome();
  setTimeout(()=>{
    document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'});
  },50);
  document.querySelectorAll('.nav-pill').forEach(p=>p.classList.remove('active'));
  if(e&&e.target) e.target.classList.add('active');
}

// =================================================================================
// RIPPLE INIT
// =================================================================================
document.querySelectorAll('.mp-btn,.max-ctrl,.max-action-btn,.search-btn,.nav-pill,.mp-expand-btn,.max-back-btn').forEach(addRipple);

// =================================================================================
// INIT
// =================================================================================
loadTasteState();
try{
  const q=localStorage.getItem(SK.qual); if(q){ quality=q; mpQuality.value=q; maxQuality.value=q; }
  const v=localStorage.getItem(SK.vol);  if(v){ setVolume(parseFloat(v)); }
}catch(e){}

loadHomeSections();
</script>
