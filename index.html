
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>RhythmVerse</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
<style>
  
:root {
  --bg: #080b14;
  --surface: #0e1221;
  --surface2: #141826;
  --surface3: #1a2035;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.10);
  --accent: #f97316;
  --accent2: #fb923c;
  --accent-dim: rgba(249,115,22,0.15);
  --accent-glow: rgba(249,115,22,0.35);
  --text: #eef0f6;
  --text2: #8b93aa;
  --text3: #5a627a;
  --radius: 18px;
  --radius-sm: 12px;
  --radius-pill: 999px;
  --player-h: 88px;
  --tr: 0.22s cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:var(--text);overflow-x:hidden;min-height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:99px;}
  /* ========================================
   🔥 ULTIMATE UI ENHANCEMENTS - FINAL PART
   ======================================== */

/* ===== 1. CARD GLOW ON HOVER (ENHANCED) ===== */
.song-card {
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
}
.song-card::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: var(--radius);
  background: linear-gradient(135deg, 
    var(--accent), 
    transparent 30%, 
    transparent 70%, 
    var(--accent)
  );
  background-size: 300% 300%;
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: -1;
}
.song-card:hover::before {
  opacity: 1;
  animation: borderGlowSpin 3s ease-in-out infinite;
}
@keyframes borderGlowSpin {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* ===== 2. PULSING GLOW ON PLAYING CARD ===== */
.song-card.is-playing {
  animation: playingPulse 2s ease-in-out infinite;
  border-color: var(--accent-glow);
}
@keyframes playingPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(249,115,22,0); }
  50% { box-shadow: 0 0 30px rgba(249,115,22,0.15); }
}

/* ===== 3. 3D TILT ON CARDS ===== */
.song-card {
  transform: perspective(1000px) rotateX(0) rotateY(0) translateZ(0);
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.song-card:hover {
  transform: perspective(1000px) rotateX(3deg) rotateY(8deg) translateZ(20px);
  box-shadow: 0 30px 60px rgba(0,0,0,0.6);
}

/* ===== 4. SPARKLES ON MAX PLAYER ===== */
.sparkle-container {
  position: absolute;
  inset: -40px;
  pointer-events: none;
  overflow: visible;
  z-index: 1;
}
.sparkle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 15px var(--accent-glow);
  animation: sparkleFloat 4s ease-in-out infinite;
}
.sparkle:nth-child(1) { left: 5%; top: 10%; animation-delay: 0s; --tx: 30px; --ty: -40px; }
.sparkle:nth-child(2) { left: 85%; top: 8%; animation-delay: 0.6s; --tx: -35px; --ty: -30px; }
.sparkle:nth-child(3) { left: 45%; top: 3%; animation-delay: 1.2s; --tx: 20px; --ty: -50px; }
.sparkle:nth-child(4) { left: 15%; top: 75%; animation-delay: 1.8s; --tx: 40px; --ty: 30px; }
.sparkle:nth-child(5) { left: 75%; top: 85%; animation-delay: 2.4s; --tx: -30px; --ty: 35px; }
.sparkle:nth-child(6) { left: 95%; top: 45%; animation-delay: 3s; --tx: -40px; --ty: -15px; }
.sparkle:nth-child(7) { left: 3%; top: 50%; animation-delay: 3.6s; --tx: 35px; --ty: 20px; }
.sparkle:nth-child(8) { left: 50%; top: 95%; animation-delay: 0.9s; --tx: -20px; --ty: 40px; }
@keyframes sparkleFloat {
  0% { transform: translate(0, 0) scale(0); opacity: 0; }
  40% { transform: translate(var(--tx), var(--ty)) scale(1); opacity: 1; }
  70% { transform: translate(calc(var(--tx) * 1.5), calc(var(--ty) * 1.5)) scale(1.2); opacity: 0.8; }
  100% { transform: translate(calc(var(--tx) * 2), calc(var(--ty) * 2)) scale(0); opacity: 0; }
}

/* ===== 5. ALBUM ART GLOW RING ===== */
.max-art {
  position: relative;
}
.max-art::before {
  content: '';
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--accent-glow), transparent 70%);
  opacity: 0;
  transition: opacity 0.6s ease;
  z-index: -1;
  filter: blur(40px);
}
.max-player.playing .max-art::before {
  opacity: 1;
  animation: glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(1.15); opacity: 0.6; }
}

/* ===== 6. BUTTON PRESS EFFECT ===== */
.max-ctrl:active,
.mp-btn:active,
.max-action-btn:active,
.search-btn:active,
.chip:active,
.nav-pill:active {
  transform: scale(0.92);
  transition: transform 0.1s ease;
}

/* ===== 7. SMOOTH TRANSITIONS ON ALL INTERACTIVE ELEMENTS ===== */
.max-ctrl, .mp-btn, .max-action-btn, .search-btn, .chip, .nav-pill, .song-card, .featured-card {
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ===== 8. GLOWING TEXT SHADOW ===== */
.section-label h2 {
  text-shadow: 0 0 40px rgba(249,115,22,0.1);
}
.max-title {
  text-shadow: 0 0 60px rgba(249,115,22,0.15);
}
.featured-info h3 {
  text-shadow: 0 0 30px rgba(249,115,22,0.1);
}

/* ===== 9. ENHANCED SCROLLBAR ===== */
::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}
::-webkit-scrollbar-track {
  background: var(--surface);
  border-radius: 99px;
}
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--accent), var(--accent2));
  border-radius: 99px;
  transition: all 0.3s ease;
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--accent2), var(--accent));
  transform: scale(1.1);
}

/* ===== 10. AMBIENT ORBS FLOATING ===== */
.ambient-orb {
  transition: all 2s cubic-bezier(0.4, 0, 0.2, 1);
}
#orb1 {
  animation: orbFloat1 20s ease-in-out infinite;
}
#orb2 {
  animation: orbFloat2 25s ease-in-out infinite;
}
#orb3 {
  animation: orbFloat3 18s ease-in-out infinite;
}
@keyframes orbFloat1 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(-50px, 30px) scale(1.1); }
  50% { transform: translate(30px, -20px) scale(0.9); }
  75% { transform: translate(-20px, -30px) scale(1.05); }
}
@keyframes orbFloat2 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(60px, -25px) scale(1.05); }
  50% { transform: translate(-30px, 40px) scale(0.95); }
  75% { transform: translate(25px, 25px) scale(1.1); }
}
@keyframes orbFloat3 {
  0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
  50% { transform: translate(-20px, 20px) scale(1.2); opacity: 0.6; }
}

/* ===== 11. FOOTER GLOW ===== */
footer {
  position: relative;
  padding-top: 2.5rem;
}
footer::before {
  content: '';
  position: absolute;
  top: 0;
  left: 20%;
  right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), var(--accent), transparent);
  opacity: 0.3;
  animation: footerGlow 4s ease-in-out infinite;
}
@keyframes footerGlow {
  0%, 100% { opacity: 0.3; transform: scaleX(1); }
  50% { opacity: 0.8; transform: scaleX(1.2); }
}
footer span {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
footer span:hover {
  transform: scale(1.1);
  filter: brightness(1.3);
}

/* ===== 12. TOAST WITH PROGRESS BAR ===== */
.toast {
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(20px);
  background: rgba(14, 18, 33, 0.95);
  border: 1px solid var(--border2);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.toast::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  animation: toastProgress 2.5s linear forwards;
}
@keyframes toastProgress {
  0% { width: 100%; }
  100% { width: 0%; }
}

/* ===== 13. SEARCH BAR FOCUS EFFECT ===== */
.search-bar {
  position: relative;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.search-bar::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 50%;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.search-bar:focus-within::after {
  left: 0;
  width: 100%;
}
.search-bar:focus-within {
  transform: scale(1.02);
  border-color: var(--accent);
  box-shadow: 0 0 30px var(--accent-dim);
}

/* ===== 14. NAV PILLS ACTIVE INDICATOR ===== */
.nav-pill.active {
  position: relative;
}
.nav-pill.active::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 20%;
  right: 20%;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 99px;
  animation: activePill 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes activePill {
  0% { transform: scaleX(0); opacity: 0; }
  100% { transform: scaleX(1); opacity: 1; }
}

/* ===== 15. SUGGESTION DROPDOWN ITEMS ===== */
.suggest-item {
  position: relative;
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.suggest-item::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--accent), var(--accent2));
  transform: scaleY(0);
  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.suggest-item:hover::before {
  transform: scaleY(1);
}
.suggest-item:hover {
  transform: translateX(8px);
  background: var(--accent-dim);
}

/* ===== 16. CHIP ENHANCED ===== */
.chip {
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.chip:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 8px 25px var(--accent-dim);
}
.chip:active {
  transform: scale(0.95);
}

/* ===== 17. FEATURED CARD ENHANCED ===== */
.featured-card {
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.featured-card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 30px 60px rgba(0,0,0,0.6);
}
.featured-play {
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.featured-card:hover .featured-play {
  transform: scale(1.15) rotate(-10deg);
  box-shadow: 0 0 40px var(--accent-glow);
}

/* ===== 18. SECTION HEADER UNDERLINE ===== */
.section-header {
  position: relative;
}
.section-header::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 0;
  width: 60px;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), transparent);
  border-radius: 99px;
}
.section-header:hover::after {
  animation: headerUnderline 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes headerUnderline {
  0% { width: 0; opacity: 0; }
  100% { width: 60px; opacity: 1; }
}

/* ===== 19. HISTORY ITEM ENHANCED ===== */
.history-row {
  position: relative;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.history-row::after {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--accent), var(--accent2));
  transform: scaleY(0);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.history-row:hover::after {
  transform: scaleY(1);
}
.history-thumb {
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.history-row:hover .history-thumb {
  transform: scale(1.05) rotate(-5deg);
}

/* ===== 20. MAX PLAYER CLOSE BUTTON ===== */
.max-back-btn {
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.max-back-btn:hover {
  transform: rotate(-90deg) scale(1.1);
  border-color: var(--accent-glow);
  box-shadow: 0 0 30px var(--accent-dim);
}

/* ===== 21. LIKE BUTTON ANIMATION ===== */
.max-action-btn.liked {
  animation: likePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes likePop {
  0% { transform: scale(1); }
  30% { transform: scale(1.4); }
  60% { transform: scale(0.9); }
  100% { transform: scale(1); }
}
.max-action-btn.liked svg {
  fill: #ef4444;
  color: #ef4444;
}

/* ===== 22. SHARE BUTTON ===== */
#shareBtn {
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
#shareBtn:hover {
  transform: rotate(20deg) scale(1.1);
}

/* ===== 23. REPEAT BUTTON STATE ===== */
#repeatBtn.active {
  position: relative;
}
#repeatBtn.active::after {
  content: '1';
  position: absolute;
  bottom: -2px;
  right: -2px;
  font-size: 8px;
  font-weight: 800;
  background: var(--accent);
  color: white;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== 24. SHUFFLE & LOOP BUTTON STATE ===== */
#maxShuffleBtn.active::after,
#maxLoopBtn.active::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 50%;
  transform: translateX(-50%);
  width: 12px;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 99px;
  animation: activeDot 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes activeDot {
  0% { transform: translateX(-50%) scaleX(0); }
  100% { transform: translateX(-50%) scaleX(1); }
}

/* ===== 25. PLAY BUTTON RING ===== */
.mp-play-btn::before {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  opacity: 0;
  animation: ringPulse 2s ease-out infinite;
}
@keyframes ringPulse {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(1.6); opacity: 0; }
}

/* ===== 26. MAX PLAYER CONTROLS ===== */
.max-ctrl {
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.max-ctrl:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 8px 25px var(--accent-dim);
}
.max-play {
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.max-play:hover {
  transform: scale(1.1) rotate(-5deg);
  box-shadow: 0 0 50px var(--accent-glow);
}
.max-play:active {
  transform: scale(0.95) rotate(5deg);
}

/* ===== 27. MINI PLAYER EXPAND ===== */
.mp-expand-btn {
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.mp-expand-btn:hover {
  transform: rotate(90deg) scale(1.1);
  border-color: var(--accent-glow);
  box-shadow: 0 0 30px var(--accent-dim);
}

/* ===== 28. VOLUME SLIDER ===== */
.mp-vol-wrap {
  padding: 0 4px;
}
.mp-vol {
  transition: height 0.2s ease;
}
.mp-vol:hover {
  height: 5px;
}
.mp-vol::-webkit-slider-thumb {
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.mp-vol:hover::-webkit-slider-thumb {
  transform: scale(1.4);
  box-shadow: 0 0 20px var(--accent-glow);
}

/* ===== 29. QUALITY SELECTOR ===== */
.mp-quality, .max-quality {
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  cursor: pointer;
}
.mp-quality:hover, .max-quality:hover {
  border-color: var(--accent-glow);
  box-shadow: 0 0 20px var(--accent-dim);
}
.mp-quality:focus, .max-quality:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 30px var(--accent-glow);
}

/* ===== 30. PROGRESS SLIDER ===== */
.mp-slider, .max-slider {
  transition: height 0.2s ease;
}
.mp-slider:hover, .max-slider:hover {
  height: 6px;
}
.mp-slider::-webkit-slider-thumb,
.max-slider::-webkit-slider-thumb {
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.mp-slider:hover::-webkit-slider-thumb,
.max-slider:hover::-webkit-slider-thumb {
  transform: scale(1.4);
  box-shadow: 0 0 30px var(--accent-glow);
}

/* ===== 31. LOADER ===== */
.loader {
  border: 4px solid var(--surface3);
  border-top-color: var(--accent);
  animation: spin 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* ===== 32. RESPONSIVE ENHANCEMENTS ===== */
@media(max-width: 600px) {
  .max-art { width: 200px !important; height: 200px !important; }
  .max-title { font-size: 1.2rem !important; }
  .max-controls { gap: 0.5rem !important; }
  .max-ctrl { width: 40px !important; height: 40px !important; }
  .max-play { width: 55px !important; height: 55px !important; }
  .max-ctrl svg { width: 18px !important; height: 18px !important; }
  .max-play svg { width: 22px !important; height: 22px !important; }
  .mp-controls { gap: 0.2rem !important; }
  .mp-btn { width: 32px !important; height: 32px !important; }
  .mp-btn svg { width: 14px !important; height: 14px !important; }
  .mp-play-btn { width: 38px !important; height: 38px !important; }
  .mp-play-btn svg { width: 18px !important; height: 18px !important; }
}

@media(max-width: 400px) {
  .shell { padding: 0 0.5rem 100px !important; }
  .cards-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)) !important; gap: 0.6rem !important; }
  .search-bar { padding: 0.3rem 0.3rem 0.3rem 1rem !important; }
  .search-btn { width: 34px !important; height: 34px !important; }
  .search-btn svg { width: 14px !important; height: 14px !important; }
}

/* ===== 33. FINAL TOUCH - SMOOTH ALL THE THINGS ===== */
* {
  -webkit-tap-highlight-color: transparent;
}
.song-card, .featured-card, .max-ctrl, .mp-btn, .chip, .nav-pill {
  -webkit-user-select: none;
  user-select: none;
  cursor: pointer;
}

/* ===== 34. CARD IMAGE ZOOM ===== */
.card-img {
  transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.song-card:hover .card-img {
  transform: scale(1.12) rotate(-2deg);
}

/* ===== 35. SECTION DOT ===== */
.section-label .dot {
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.section-header:hover .dot {
  transform: scale(1.3);
  box-shadow: 0 0 20px var(--accent-glow);
}

/* ===== 3. SPARKLE PARTICLES ON MAX PLAYER ===== */
.max-art {
  position: relative;
}
.sparkle-container {
  position: absolute;
  inset: -30px;
  pointer-events: none;
  overflow: visible;
}
.sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--accent-glow);
  animation: sparkleFloat 3s ease-in-out infinite;
}
.sparkle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; --tx: 20px; --ty: -30px; }
.sparkle:nth-child(2) { left: 80%; top: 15%; animation-delay: 0.5s; --tx: -25px; --ty: -20px; }
.sparkle:nth-child(3) { left: 50%; top: 5%; animation-delay: 1s; --tx: 15px; --ty: -35px; }
.sparkle:nth-child(4) { left: 20%; top: 70%; animation-delay: 1.5s; --tx: 30px; --ty: 20px; }
.sparkle:nth-child(5) { left: 70%; top: 80%; animation-delay: 2s; --tx: -20px; --ty: 25px; }
.sparkle:nth-child(6) { left: 90%; top: 50%; animation-delay: 2.5s; --tx: -30px; --ty: -10px; }
.sparkle:nth-child(7) { left: 5%; top: 45%; animation-delay: 3s; --tx: 25px; --ty: 15px; }
.sparkle:nth-child(8) { left: 40%; top: 90%; animation-delay: 0.8s; --tx: -15px; --ty: 30px; }

@keyframes sparkleFloat {
  0% { transform: translate(0, 0) scale(0); opacity: 0; }
  40% { transform: translate(var(--tx), var(--ty)) scale(1); opacity: 1; }
  70% { transform: translate(calc(var(--tx) * 1.5), calc(var(--ty) * 1.5)) scale(1.2); opacity: 0.8; }
  100% { transform: translate(calc(var(--tx) * 2), calc(var(--ty) * 2)) scale(0); opacity: 0; }
}

/* ===== 4. 3D PERSPECTIVE ON CARDS ===== */
.song-card {
  transform: perspective(1000px) rotateX(0) rotateY(0) translateZ(0);
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.song-card:hover {
  transform: perspective(1000px) rotateX(3deg) rotateY(8deg) translateZ(20px);
  box-shadow: 0 30px 60px rgba(0,0,0,0.6);
}

/* ===== 5. CARD IMAGE PARALLAX ===== */
.card-img-wrap {
  overflow: hidden;
}
.card-img {

}
.song-card:hover .card-img {
  transform: scale(1.12) rotate(-2deg);
}

/* ===== 6. PLAY BUTTON RIPPLE RING ===== */
.mp-play-btn::before {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;

  opacity: 0;

}
@keyframes ringPulse {

  100% { transform: scale(1.6); opacity: 0; }
}

/* ===== 7. MAX PLAYER CONTROLS GLOW ===== */
.max-ctrl {

}

/* ===== 8. MINI PLAYER EXPAND BUTTON ===== */

/* ===== 9. TOAST WITH PROGRESS BAR ===== */

}

  position: absolute;

  left: 0;

}

/* ===== 10. SEARCH BAR ENHANCED ===== */

/* ===== 12. SECTION HEADER UNDERLINE ===== */

/* ===== 13. HISTORY ITEM ENHANCED ===== */

/* ===== 15. CHIP ENHANCED ===== */

/* ===== 16. NAV PILL ENHANCED ===== */

/* ===== 17. AMBIENT ORB WITH PULSE ===== */

/* ===== 18. SCROLLBAR ENHANCED ===== */

/* ===== 1. ENHANCED LINEAR PROGRESS BAR ===== */
.linear-track {
  position: relative;
  width: 100%;
  height: 3px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
}
.bar {
  position: absolute;
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  opacity: 0.7;
}
.bar1 {
  width: 40%;
  animation: barMove1 2s ease-in-out infinite;
}
.bar2 {
  width: 30%;
  animation: barMove2 2s ease-in-out 0.5s infinite;
}
@keyframes barMove1 {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(300%); }
}
@keyframes barMove2 {
  0% { transform: translateX(-150%); }
  100% { transform: translateX(350%); }
}

/* ===== 2. SMOOTH SCROLLBAR FOR CARDS ===== */
.cards-row {
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: var(--accent) transparent;
}
.cards-row::-webkit-scrollbar {
  height: 4px;
  background: transparent;
}
.cards-row::-webkit-scrollbar-track {
  background: var(--surface2);
  border-radius: 99px;
}
.cards-row::-webkit-scrollbar-thumb {
  background: var(--accent);
  border-radius: 99px;
  transition: background 0.3s ease;
}
.cards-row::-webkit-scrollbar-thumb:hover {
  background: var(--accent2);
}

/* ===== 3. GLOWING CARD BORDER - ALREADY HAVE BUT ENHANCED ===== */
.song-card {
  position: relative;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.song-card::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: var(--radius);
  background: linear-gradient(135deg, 
    var(--accent), 
    transparent 40%, 
    transparent 60%, 
    var(--accent)
  );
  background-size: 300% 300%;
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: -1;
}
.song-card:hover::before {
  opacity: 1;
  animation: borderGlowSpin 3s ease-in-out infinite;
}
@keyframes borderGlowSpin {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* ===== 4. CARD LIFT WITH SHADOW ===== */
.song-card {
  transform: perspective(800px) rotateX(0) rotateY(0) translateY(0);
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.song-card:hover {
  transform: perspective(800px) rotateX(2deg) rotateY(4deg) translateY(-8px);
  box-shadow: 0 25px 50px rgba(0,0,0,0.6);
}

  animation: playingPulse 2s ease-in-out infinite;

}
@keyframes playingPulse {

}

.toast {

@keyframes arrow-right-3{ 0%{opacity:0;transform:translateX(-8px)}40%{opacity:1}100%{opacity:0;transform:translateX(8px)} }
.seek-flash-label{
  font-family:'Space Grotesk',sans-serif;
  font-size:1rem;font-weight:700;color:white;
  text-shadow:0 2px 8px rgba(0,0,0,0.6);
  opacity:0;animation:label-pop 0.45s ease forwards;
}
@keyframes label-pop{ 0%{opacity:0;transform:scale(0.8)}40%{opacity:1;transform:scale(1.1)}70%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1)} }
/* ===== MD3 LOADER ===== */
.md3-stage{position:relative;width:56px;height:56px;display:flex;justify-content:center;align-items:center;margin:0 auto;}
.md3-spinner{position:absolute;width:100%;height:100%;animation:md3-rotate 2s linear infinite;}
.md3-path{fill:none;stroke:var(--accent);stroke-width:5px;stroke-linecap:round;animation:md3-arc 1.5s cubic-bezier(0.4,0,0.2,1) infinite;}
.md3-pct{position:absolute;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:var(--text);}
@keyframes md3-rotate{100%{transform:rotate(360deg);}}
@keyframes md3-arc{
  0%{stroke-dasharray:1,200;stroke-dashoffset:0;}
  50%{stroke-dasharray:120,200;stroke-dashoffset:-15px;}
  100%{stroke-dasharray:120,200;stroke-dashoffset:-125px;}
}
/* ===== SEARCH ===== */
.search-wrap{max-width:680px;margin:0.5rem auto 1.5rem;display:flex;flex-direction:column;align-items:center;gap:0.9rem;}
.search-bar{width:100%;display:flex;align-items:center;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius-pill);padding:0.5rem 0.5rem 0.5rem 1.4rem;gap:0.7rem;transition:var(--tr);box-shadow:0 4px 32px rgba(0,0,0,0.3);}
.search-bar:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim),0 8px 32px rgba(0,0,0,0.4);}
.search-bar svg{width:20px;height:20px;fill:var(--text3);flex-shrink:0;transition:var(--tr);}
.search-bar:focus-within svg{fill:var(--accent);}
.search-bar input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:1rem;font-family:inherit;caret-color:var(--accent);}
.search-bar input::placeholder{color:var(--text3);}
.search-btn{background:linear-gradient(135deg,#fb923c,#f97316);border:none;color:white;width:40px;height:40px;border-radius:var(--radius-pill);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--tr);position:relative;overflow:hidden;}
.search-btn:hover{transform:scale(1.08);box-shadow:0 0 16px var(--accent-glow);}
.search-btn svg{width:18px;height:18px;fill:white;pointer-events:none;}
.search-meta-row{display:flex;justify-content:space-between;width:100%;font-size:0.79rem;color:var(--text3);padding:0 0.2rem;}
.chips-row{display:flex;flex-wrap:wrap;gap:0.45rem;justify-content:center;width:100%;}
.chip{background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius-pill);padding:0.38rem 0.85rem;cursor:pointer;font-size:0.78rem;font-weight:600;transition:var(--tr);position:relative;overflow:hidden;}
.chip:hover{border-color:var(--accent-glow);color:var(--accent2);}
.chip.active{background:var(--accent-dim);border-color:var(--accent-glow);color:#fff2e7;}

/* ===== SEARCH SUGGESTIONS DROPDOWN ===== */
.suggest-dropdown{position:absolute;top:calc(100% - 0.5rem);left:0;right:0;z-index:50;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);box-shadow:0 16px 40px rgba(0,0,0,0.5);overflow:hidden;opacity:0;transform:translateY(-6px);pointer-events:none;transition:var(--tr);max-height:340px;overflow-y:auto;}
.suggest-dropdown.visible{opacity:1;transform:translateY(0);pointer-events:all;}
.suggest-group-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text3);padding:0.7rem 1rem 0.3rem;}
.suggest-item{display:flex;align-items:center;gap:0.7rem;padding:0.6rem 1rem;cursor:pointer;transition:background 0.15s ease;}
.suggest-item:hover,.suggest-item.kbd-active{background:var(--accent-dim);}
.suggest-item svg{width:16px;height:16px;fill:var(--text3);flex-shrink:0;}
.suggest-item:hover svg,.suggest-item.kbd-active svg{fill:var(--accent);}
.suggest-text{flex:1;min-width:0;font-size:0.86rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.suggest-text b{color:var(--accent2);font-weight:700;}
.suggest-tag{font-size:0.66rem;color:var(--text3);background:var(--surface3);padding:2px 7px;border-radius:var(--radius-pill);flex-shrink:0;}

/* ===== HISTORY VIEW ===== */
.history-date-group{margin-bottom:1.6rem;}
.history-date-label{font-family:'Space Grotesk',sans-serif;font-size:0.85rem;font-weight:700;color:var(--text2);margin-bottom:0.7rem;padding-left:0.2rem;display:flex;align-items:center;gap:8px;}
.history-date-label::after{content:'';flex:1;height:1px;background:var(--border);}
.history-row{display:flex;align-items:center;gap:1rem;padding:0.7rem 0.9rem;border-radius:var(--radius-sm);cursor:pointer;transition:var(--tr);position:relative;overflow:hidden;}
.history-row:hover{background:var(--surface2);}
.history-row + .history-row{border-top:1px solid var(--border);}
.history-thumb{width:46px;height:46px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--surface2);}
.history-info{flex:1;min-width:0;}
.history-title{font-size:0.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.history-artist{font-size:0.74rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.history-meta{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.history-time{font-size:0.74rem;color:var(--text3);font-family:'Space Grotesk',sans-serif;min-width:64px;text-align:right;}
.history-replay{font-size:0.68rem;color:var(--accent2);background:var(--accent-dim);padding:2px 7px;border-radius:var(--radius-pill);flex-shrink:0;}
.history-completed{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0;box-shadow:0 0 5px rgba(74,222,128,0.6);}
.history-completed.incomplete{background:var(--text3);box-shadow:none;}
.history-empty{text-align:center;padding:3rem 1rem;color:var(--text3);}
.history-empty svg{width:48px;height:48px;fill:var(--text3);opacity:0.4;margin-bottom:1rem;}

/* ===== SECTION ===== */
.section-header{display:flex;align-items:center;justify-content:space-between;margin:2rem 0 1.1rem;gap:1rem;}
.section-label{display:flex;align-items:center;gap:0.6rem;min-width:0;}
.section-label h2{font-family:'Space Grotesk',sans-serif;font-size:1.35rem;font-weight:800;letter-spacing:-0.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.section-label .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 6px var(--accent-glow);flex-shrink:0;}
.section-sub{font-size:0.76rem;color:var(--text3);margin-top:2px;}
.section-count{font-size:0.78rem;color:var(--text3);background:var(--surface2);border:1px solid var(--border);padding:3px 10px;border-radius:var(--radius-pill);flex-shrink:0;}

/* ===== HERO ===== */
.hero-section{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:2rem;}
@media(max-width:900px){.hero-section{grid-template-columns:1fr;}}
.featured-card{background:linear-gradient(135deg,var(--surface2),var(--surface3));border:1px solid var(--border2);border-radius:22px;padding:1.5rem;display:flex;align-items:center;gap:1.2rem;cursor:pointer;position:relative;overflow:hidden;transition:var(--tr);}
.featured-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(249,115,22,0.05) 0%,transparent 60%);pointer-events:none;}
.featured-card:hover{border-color:var(--accent-glow);transform:translateY(-3px);box-shadow:0 24px 48px rgba(0,0,0,0.5);}
.featured-img{width:90px;height:90px;border-radius:14px;object-fit:cover;flex-shrink:0;box-shadow:0 8px 24px rgba(0,0,0,0.5);}
.featured-info{flex:1;min-width:0;}
.featured-tag{font-size:0.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.4rem;}
.featured-info h3{font-size:1.05rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:0.3rem;}
.featured-info p{font-size:0.78rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.featured-play{width:40px;height:40px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 16px var(--accent-glow);transition:var(--tr);}
.featured-card:hover .featured-play{transform:scale(1.12);box-shadow:0 0 24px var(--accent-glow);}
.featured-play svg{width:16px;height:16px;fill:white;margin-left:2px;}
/* ===== MD3 LOADER WITH ERROR STATE ===== */
.md3-stage{position:relative;width:56px;height:56px;display:flex;justify-content:center;align-items:center;margin:0 auto 0.5rem;}
.md3-spinner{position:absolute;width:100%;height:100%;animation:md3-rotate 2s linear infinite;transition:transform 0.5s cubic-bezier(0.2,0,0,1),opacity 0.3s ease;}
.md3-path{fill:none;stroke:var(--accent);stroke-width:5px;stroke-linecap:round;animation:md3-arc 1.5s cubic-bezier(0.4,0,0.2,1) infinite;}
@keyframes md3-rotate{100%{transform:rotate(360deg);}}
@keyframes md3-arc{
  0%{stroke-dasharray:1,200;stroke-dashoffset:0;}
  50%{stroke-dasharray:120,200;stroke-dashoffset:-15px;}
  100%{stroke-dasharray:120,200;stroke-dashoffset:-125px;}
}
.md3-error-icon{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;transform:scale(0) rotate(-60deg);transition:transform 0.6s cubic-bezier(0.34,1.7,0.64,1),opacity 0.3s ease;pointer-events:none;}
.md3-error-stem{width:5px;height:20px;background:#ef4444;border-radius:3px;margin-bottom:4px;}
.md3-error-dot{width:5px;height:5px;background:#ef4444;border-radius:50%;}
.md3-stage.failed .md3-spinner{opacity:0;transform:scale(0.4) rotate(180deg);}
.md3-stage.failed .md3-error-icon{opacity:1;transform:scale(1) rotate(0deg);}
/* ===== CARDS GRID ===== */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1.2rem;}
.cards-row{display:flex;gap:1.2rem;overflow-x:auto;padding-bottom:6px;scroll-snap-type:x proximate;}
.cards-row::-webkit-scrollbar{height:5px;}
.cards-row .song-card{flex:0 0 170px;scroll-snap-align:start;}
.song-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;position:relative;overflow:hidden;transition:var(--tr);animation:fade-up 0.38s ease both;}
.song-card:hover{transform:translateY(-6px);border-color:rgba(249,115,22,0.35);box-shadow:0 20px 40px rgba(0,0,0,0.5);}
.song-card:hover .card-overlay{opacity:1;}
.song-card:hover .card-play-btn{opacity:1;transform:scale(1);}
@keyframes fade-up{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.card-img-wrap{position:relative;aspect-ratio:1/1;overflow:hidden;}
.card-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.5s ease;background:var(--surface2);}
.song-card:hover .card-img{transform:scale(1.07);}
.card-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,0.7) 100%);opacity:0;transition:var(--tr);}
.card-play-btn{position:absolute;bottom:10px;right:10px;width:38px;height:38px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(0.7);transition:var(--tr);box-shadow:0 4px 16px rgba(249,115,22,0.5);}
.card-play-btn svg{width:15px;height:15px;fill:white;margin-left:2px;}
.card-rank{position:absolute;top:8px;left:8px;width:24px;height:24px;border-radius:50%;background:rgba(8,11,20,0.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:0.7rem;font-weight:800;color:var(--accent2);border:1px solid var(--border2);}
.card-body{padding:0.85rem;}
.card-title{font-size:0.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.card-artist{font-size:0.72rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.card-dur{font-size:0.68rem;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:var(--radius-pill);}
.card-playing-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse-dot 1s ease-in-out infinite;display:none;}
.song-card.is-playing .card-playing-dot{display:block;}
.song-card.is-playing{border-color:var(--accent-glow);background:rgba(249,115,22,0.06);}

/* ===== HOME SECTIONS ===== */
.home-block{background:rgba(255,255,255,0.018);border:1px solid var(--border);border-radius:22px;padding:1.4rem;margin-bottom:1.5rem;}
.home-block.rec-block{border-color:rgba(249,115,22,0.12);background:linear-gradient(135deg,rgba(249,115,22,0.025),rgba(255,255,255,0.018));}
.status-card{background:var(--surface2);border:1px dashed var(--border2);border-radius:var(--radius);padding:1.2rem;color:var(--text3);font-size:0.85rem;text-align:center;}

/* taste pills shown above recommendation rails */
.taste-strip{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1.1rem;}
.taste-pill{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);border-radius:var(--radius-pill);padding:0.3rem 0.75rem 0.3rem 0.55rem;font-size:0.73rem;font-weight:600;}
.taste-pill .tp-bar{width:24px;height:4px;border-radius:99px;background:var(--surface3);overflow:hidden;position:relative;}
.taste-pill .tp-bar::after{content:'';position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--accent2),var(--accent));width:var(--w,40%);}
.taste-empty-hint{font-size:0.78rem;color:var(--text3);}

/* ===== LOADER ===== */
.loader-wrap{display:flex;justify-content:center;align-items:center;min-height:200px;flex-direction:column;gap:1rem;}
.loader{width:44px;height:44px;border:3px solid var(--surface3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-size:0.85rem;color:var(--text3);}
.rail-loader{display:flex;gap:1.2rem;overflow:hidden;}
.rail-skel{flex:0 0 170px;height:230px;border-radius:var(--radius);background:linear-gradient(100deg,var(--surface) 30%,var(--surface2) 50%,var(--surface) 70%);background-size:200% 100%;animation:skel-shine 1.4s ease-in-out infinite;}
@keyframes skel-shine{to{background-position:-200% 0;}}
/* Add to existing styles */
/* Enhanced Floating Art with Glow */
.max-art {
  position: relative;
  animation: floatGlow 4s ease-in-out infinite;
  border-radius: 22px;
}

@keyframes floatGlow {
  0%, 100% { 
    transform: translateY(0px) scale(1);
    box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06);
  }
  50% { 
    transform: translateY(-12px) scale(1.02);
    box-shadow: 0 40px 100px var(--accent-glow), 0 0 0 2px var(--accent-dim);
  }
}

/* Pause animation when not playing */
.max-player:not(.playing) .max-art {
  animation-play-state: paused;
}

/* Holographic shimmer overlay on album art */
.max-art::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 22px;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.1) 0%,
    transparent 40%,
    transparent 60%,
    rgba(255,255,255,0.05) 100%
  );
  pointer-events: none;
}
/* Dynamic background that shifts with music */
.max-bg {
  transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  animation: gradientShift 8s ease-in-out infinite;
}
/* ===== TOOLTIPS ===== */
[title] {
  position: relative;
}

[title]:hover::after {
  content: attr(title);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  padding: 4px 10px;
  background: var(--surface2);
  color: var(--text);
  font-size: 0.7rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  white-space: nowrap;
  pointer-events: none;
  z-index: 100;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 500;
}
  /* Smooth scrolling for card rows */
.cards-row {
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: var(--accent) transparent;
}

.cards-row::-webkit-scrollbar {
  height: 4px;
  background: transparent;
}

.cards-row::-webkit-scrollbar-track {
  background: var(--surface2);
  border-radius: 99px;
}

.cards-row::-webkit-scrollbar-thumb {
  background: var(--accent);
  border-radius: 99px;
  transition: background 0.3s ease;
}

.cards-row::-webkit-scrollbar-thumb:hover {
  background: var(--accent2);
}
@keyframes gradientShift {
  0%, 100% { filter: blur(80px) brightness(0.25) saturate(200%); }
  50% { filter: blur(100px) brightness(0.35) saturate(250%); }
}
/* Card now playing pulse */
.song-card.is-playing {
  position: relative;
  animation: playingPulse 2s ease-in-out infinite;
  border-color: var(--accent-glow);
}

@keyframes playingPulse {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(249,115,22,0);
  }
  50% {
    box-shadow: 0 0 20px rgba(249,115,22,0.15);
  }
}

/* Playing indicator dot animation - already have pulse-dot */
/* Pulse glow for the playing indicator */
.playing-glow {
  animation: pulseGlow 2s ease-in-out infinite;
}
/* Mini player slide with bounce */
.mini-player {
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Maximized player with scale & fade */
.max-player {
  transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.max-player.open {
  animation: slideUpFade 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes slideUpFade {
  0% {
    opacity: 0;
    transform: scale(0.95) translateY(20px);
  }
  100% {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
  50% { box-shadow: 0 0 60px var(--accent-glow); }
}
@keyframes float {
  0%, 100% { 
    transform: translateY(0px) scale(1);
    box-shadow: 0 32px 80px rgba(0,0,0,0.7);
  }
  50% { 
    transform: translateY(-12px) scale(1.02);
    box-shadow: 0 40px 100px rgba(249,115,22,0.3);
  }
}

/* Pause animation when not playing */
.max-player:not(.playing) .max-art {
  animation-play-state: paused;
}
/* ===== SEARCH RESULTS ===== */
.results-section{display:none;}
.results-section.visible{display:block;}

/* ===== RIPPLE (confined to element) ===== */
.ripple-host{position:relative;overflow:hidden;}
.ripple-effect{position:absolute;border-radius:50%;transform:scale(0);animation:ripple-out 0.55s ease-out forwards;background:rgba(255,255,255,0.25);pointer-events:none;z-index:10;}
@keyframes ripple-out{to{transform:scale(4);opacity:0;}}
/* Add dancing waveform to max player */
.waveform {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  height: 30px;
  margin: 0.5rem 0;
}

.wave-bar {
  width: 4px;
  background: var(--accent);
  border-radius: 2px;
  animation: wave 1.2s ease-in-out infinite;
}

.wave-bar:nth-child(1) { height: 10px; animation-delay: 0s; }
.wave-bar:nth-child(2) { height: 18px; animation-delay: 0.1s; }
.wave-bar:nth-child(3) { height: 24px; animation-delay: 0.2s; }
.wave-bar:nth-child(4) { height: 30px; animation-delay: 0.3s; }
.wave-bar:nth-child(5) { height: 26px; animation-delay: 0.4s; }
.wave-bar:nth-child(6) { height: 16px; animation-delay: 0.5s; }
.wave-bar:nth-child(7) { height: 8px; animation-delay: 0.6s; }

@keyframes wave {
  0%, 100% { transform: scaleY(0.3); opacity: 0.5; }
  50% { transform: scaleY(1); opacity: 1; }
}

.waveform.paused .wave-bar {
  animation-play-state: paused;
}
/* ===== MINI PLAYER ===== */

/* Play button transforms smoothly */
.mp-play-btn {
  position: relative;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.mp-play-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px var(--accent-glow);
}

.mp-play-btn:active {
  transform: scale(0.9);
}

/* Icon morph */
.play-icon-wrap svg {
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Animated ring on play */
.mp-play-btn::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  opacity: 0;
  animation: ringPulse 1.5s ease-out infinite;
}
/* Glowing card border on hover */
.song-card {
  position: relative;
}

.song-card::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: var(--radius);
  background: linear-gradient(45deg, 
    var(--accent), 
    transparent, 
    var(--accent)
  );
  background-size: 200% 200%;
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: -1;
}

.song-card:hover::before {
  opacity: 1;
  animation: borderGlow 2s ease-in-out infinite;
}

@keyframes borderGlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* 3D tilt effect on cards */
.song-card {
  transform: perspective(1000px) rotateX(0) rotateY(0);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.song-card:hover {
  transform: perspective(1000px) rotateX(3deg) rotateY(5deg);
}
@keyframes ringPulse {
  0% {
    transform: scale(1);
    opacity: 1;
  }
  100% {
    transform: scale(1.4);
    opacity: 0;
  }
}
/* ===== EQ BARS ===== */
.eq-bars{display:flex;align-items:flex-end;gap:2px;height:16px;margin-top:3px;}
.eq-bar{width:3px;background:var(--accent);border-radius:2px;animation:eq-bounce 0.8s ease-in-out infinite;}
.eq-bar:nth-child(1){height:8px;animation-delay:0s;}
.eq-bar:nth-child(2){height:14px;animation-delay:0.15s;}
.eq-bar:nth-child(3){height:10px;animation-delay:0.3s;}
.eq-bar:nth-child(4){height:16px;animation-delay:0.45s;}
.eq-bar:nth-child(5){height:6px;animation-delay:0.6s;}
@keyframes eq-bounce{0%,100%{transform:scaleY(0.4);}50%{transform:scaleY(1);}}
.eq-bars.paused .eq-bar{animation-play-state:paused;}

<script>
// =================================================================================
// CONFIG
// =================================================================================
const API = 'https://saavn.sumit.co/api/search/songs';
const MAX_HIST = 8;
const PLAY_PATH  = 'M8 5v14l11-7z';
const PAUSE_PATH = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';

const QUERY_BANK = {
  telugu:   ['telugu new songs 2025','telugu trending hits','telugu romantic songs','telugu movie songs 2024','telugu love songs','tollywood blockbusters','telugu item songs','telugu mass hits'],
  hindi:    ['hindi new songs 2025','bollywood trending hits','hindi romantic songs','hindi love songs 2024','hindi blockbuster songs','latest hindi music','hindi party songs','hindi sad songs'],
  tamil:    ['tamil new songs 2025','tamil trending hits','kollywood songs 2024','tamil romantic songs','tamil mass hits','tamil love songs','vijay songs','thalapathy hits'],
  malayalam:['malayalam new songs 2025','malayalam trending hits','mollywood songs 2024','malayalam romantic songs','onam songs malayalam','malayalam love songs','prithviraj songs','dulquer salmaan hits'],
};

function pickQuery(lang){
  const arr = QUERY_BANK[lang]||[];
  return arr[Math.floor(Math.random()*arr.length)];
}

// =================================================================================
// TASTE ENGINE — knowledge graph + signal extraction + scoring + query generation
// =================================================================================
//
// The API gives us song/artist/language metadata only — no "era" or "mood" tags.
// So the engine carries a small curated knowledge graph mapping known artists to
// {era, mood, language, relatedArtists}. Unrecognized free text still contributes
// raw keyword signals even when an artist isn't in the graph, so the system never
// fully degrades to "no signal" — it just relies more on literal keyword echoes.
const ARTIST_GRAPH = {
  'S. P. Balasubrahmanyam': {aliases:['spb','balasubrahmanyam','s.p.balasubrahmanyam','sp balu'], language:'Telugu', era:'Classic', mood:'Melody',
    related:['K. S. Chithra','S. Janaki','Ilaiyaraaja','Mano','K. J. Yesudas']},
  'K. S. Chithra': {aliases:['chithra','k.s.chithra','ks chithra'], language:'Telugu', era:'Classic', mood:'Melody',
    related:['S. P. Balasubrahmanyam','S. Janaki','Mano','K. J. Yesudas']},
  'S. Janaki': {aliases:['janaki','s.janaki'], language:'Telugu', era:'Classic', mood:'Melody',
    related:['S. P. Balasubrahmanyam','K. S. Chithra','Ilaiyaraaja']},
  'Ilaiyaraaja': {aliases:['ilaiyaraaja','ilayaraja','raaja'], language:'Tamil', era:'Classic', mood:'Melody',
    related:['S. P. Balasubrahmanyam','K. S. Chithra','S. Janaki','K. J. Yesudas']},
  'K. J. Yesudas': {aliases:['yesudas','k.j.yesudas'], language:'Malayalam', era:'Classic', mood:'Melody',
    related:['S. Janaki','K. S. Chithra','S. P. Balasubrahmanyam']},
  'Mano': {aliases:['mano'], language:'Telugu', era:'Classic', mood:'Melody', related:['S. P. Balasubrahmanyam','K. S. Chithra']},
  'A. R. Rahman': {aliases:['a.r.rahman','ar rahman','rahman'], language:'Tamil', era:'Modern Classic', mood:'Soulful',
    related:['Hariharan','Sid Sriram','Shreya Ghoshal']},
  'Sid Sriram': {aliases:['sid sriram'], language:'Telugu', era:'Contemporary', mood:'Soulful',
    related:['A. R. Rahman','Anirudh Ravichander','Armaan Malik']},
  'Anirudh Ravichander': {aliases:['anirudh'], language:'Tamil', era:'Contemporary', mood:'Mass/Energetic',
    related:['Sid Sriram','Yuvan Shankar Raja']},
  'Devi Sri Prasad': {aliases:['dsp','devi sri prasad'], language:'Telugu', era:'Contemporary', mood:'Mass/Energetic',
    related:['Anirudh Ravichander','Thaman S']},
  'Thaman S': {aliases:['thaman','s thaman'], language:'Telugu', era:'Contemporary', mood:'Mass/Energetic', related:['Devi Sri Prasad']},
  'Shreya Ghoshal': {aliases:['shreya ghoshal','shreya'], language:'Hindi', era:'Contemporary', mood:'Romantic',
    related:['Arijit Singh','Sunidhi Chauhan','A. R. Rahman']},
  'Arijit Singh': {aliases:['arijit singh','arijit'], language:'Hindi', era:'Contemporary', mood:'Romantic',
    related:['Shreya Ghoshal','Jubin Nautiyal','Armaan Malik']},
  'Lata Mangeshkar': {aliases:['lata mangeshkar','lata'], language:'Hindi', era:'Classic', mood:'Melody',
    related:['Kishore Kumar','Mohammed Rafi','Asha Bhosle']},
  'Kishore Kumar': {aliases:['kishore kumar','kishore'], language:'Hindi', era:'Classic', mood:'Melody',
    related:['Lata Mangeshkar','Mohammed Rafi']},
  'Mohammed Rafi': {aliases:['mohammed rafi','rafi'], language:'Hindi', era:'Classic', mood:'Melody',
    related:['Lata Mangeshkar','Kishore Kumar']},
  'Vijay Yesudas': {aliases:['vijay yesudas'], language:'Malayalam', era:'Contemporary', mood:'Melody', related:['K. J. Yesudas']},
  'Dulquer Salmaan': {aliases:['dulquer salmaan','dqsalmaan'], language:'Malayalam', era:'Contemporary', mood:'Romantic', related:['Vijay Yesudas']},
};

// flat alias → canonical-name lookup, built once
const ALIAS_TO_ARTIST = {};
Object.entries(ARTIST_GRAPH).forEach(([name,info])=>{
  ALIAS_TO_ARTIST[name.toLowerCase()] = name;
  (info.aliases||[]).forEach(a=>{ ALIAS_TO_ARTIST[a.toLowerCase()] = name; });
});

const LANGUAGE_KEYWORDS = {
  Telugu:['telugu','tollywood'], Hindi:['hindi','bollywood'], Tamil:['tamil','kollywood'],
  Malayalam:['malayalam','mollywood'], Kannada:['kannada','sandalwood'],
};
const ERA_KEYWORDS = {
  Classic:['old','classic','90s','80s','retro','golden','evergreen'],
  Contemporary:['new','2024','2025','2026','latest','trending'],
};
const MOOD_KEYWORDS = {
  Melody:['melody','melodies','soulful','soothing'],
  Romantic:['love','romantic','romance'],
  'Mass/Energetic':['mass','party','dance','item','energetic','beats'],
  Sad:['sad','breakup','emotional'],
};

// ---- Taste profile state: weighted signal buckets ----
// Each bucket maps signal value -> accumulated score. Scores decay slightly for
// older entries and grow with repetition, mirroring how a real recsys upweights
// recurring signals without ever fully discarding history.
function emptyProfile(){
  return {
    artists:{}, languages:{}, eras:{}, moods:{}, rawTerms:{},
    // ---- NEW factors, layered on top of the existing five buckets ----
    timeOfDay:{},          // 'Morning'|'Afternoon'|'Evening'|'Night' -> weight, learned from when you actually play music
    coOccurringArtists:{}, // 'ArtistA::ArtistB' -> weight, learned from artists played close together in one session (covers artists outside the curated graph)
  };
}
let tasteProfile = emptyProfile();
let searchLog = []; // [{query, songs:[...], ts}]
// playLog: every song actually pressed play on. Each entry now carries a real
// timestamp (ts, epoch ms) plus a human-readable dateLabel/timeLabel pair
// (computed at record time so History always displays correctly even if the
// browser's locale changes later), a completed flag (did it play through),
// and playCount (incremented on repeat plays of the same song).
let playLog = []; // [{songId, title, artist, img, ts, dateLabel, timeLabel, completed, playCount}]

const TP_KEY = 'rv_taste_profile';
const SL_KEY = 'rv_search_log';
const PL_KEY = 'rv_play_log';

// Recent-artists queue, kept in memory only (not persisted) — used purely to
// detect "these two artists were played close together" within the current
// browsing session, which feeds the new coOccurringArtists factor below.
const RECENT_ARTIST_WINDOW = 4;
let recentArtistQueue = [];

function loadTasteState(){
  try{
    const p = localStorage.getItem(TP_KEY);
    if(p){
      const parsed = JSON.parse(p);
      // Backfill-safe merge: a profile saved before this update won't have
      // timeOfDay/coOccurringArtists yet — merge onto a fresh empty profile
      // so every bucket always exists and bump() never hits undefined.
      tasteProfile = Object.assign(emptyProfile(), parsed);
    }
    const l = localStorage.getItem(SL_KEY);
    if(l) searchLog = JSON.parse(l);
    const pl = localStorage.getItem(PL_KEY);
    if(pl) playLog = JSON.parse(pl);
  }catch(e){ tasteProfile = emptyProfile(); searchLog = []; playLog = []; }
}
function saveTasteState(){
  try{
    localStorage.setItem(TP_KEY, JSON.stringify(tasteProfile));
    localStorage.setItem(SL_KEY, JSON.stringify(searchLog));
    localStorage.setItem(PL_KEY, JSON.stringify(playLog));
  }catch(e){}
}


function bump(bucket, key, amount){
  if(!key) return;
  bucket[key] = (bucket[key]||0) + amount;
}

// Extract signals from the literal query text itself (works even with zero API results)
function extractTextSignals(query){
  const q = query.toLowerCase();
  const sig = {languages:[], eras:[], moods:[], artists:[], terms:[]};
  Object.entries(LANGUAGE_KEYWORDS).forEach(([lang,words])=>{ if(words.some(w=>q.includes(w))) sig.languages.push(lang); });
  Object.entries(ERA_KEYWORDS).forEach(([era,words])=>{ if(words.some(w=>q.includes(w))) sig.eras.push(era); });
  Object.entries(MOOD_KEYWORDS).forEach(([mood,words])=>{ if(words.some(w=>q.includes(w))) sig.moods.push(mood); });
  Object.entries(ALIAS_TO_ARTIST).forEach(([alias,canon])=>{ if(q.includes(alias)) sig.artists.push(canon); });
  // keep meaningful raw tokens (drop tiny stopwords + strip punctuation) as a fallback signal.
  // Punctuation stripping matters here because this function now also runs on
  // raw song titles/albums (e.g. 'Jabilli Kosam (From "Movie Name")'), which
  // carry parens/quotes that a plain whitespace split would leave attached.
  q.replace(/[()\[\]"'.,!?]/g,' ').split(/\s+/).filter(t=>t.length>3 && !['song','songs','music','telugu','hindi','tamil','from'].includes(t)).forEach(t=>sig.terms.push(t));
  return sig;
}

// Extract signals from actual returned song metadata — this is the strongest
// signal because it reflects what the user *actually* searched into existence,
// not just words they typed.
function extractSongSignals(songs, unrecognizedWeight){
  const w = unrecognizedWeight != null ? unrecognizedWeight : 4;
  const sig = {languages:[], artists:[]};
  songs.slice(0,6).forEach(s=>{
    if(s.language) sig.languages.push(s.language[0].toUpperCase()+s.language.slice(1));
    (s.artists?.primary||[]).forEach(a=>{
      const canon = ALIAS_TO_ARTIST[a.name?.toLowerCase()] || (ARTIST_GRAPH[a.name] ? a.name : null);
      if(canon) sig.artists.push(canon);
      else bump(tasteProfile.artists, a.name, w); // unrecognized artist still tracked directly
    });
  });
  return sig;
}

// Main entry point: call every time the user runs a search, feeding both the
// query text and (once fetched) the resulting songs into the profile.
function recordSearchSignal(query, songs){
  const textSig = extractTextSignals(query);
  const songSig = songs ? extractSongSignals(songs, 12) : {languages:[],artists:[]};

  // Weights — tuned so a concrete artist match dominates a vague keyword match,
  // and metadata-confirmed artists outweigh merely-typed artist names.
  textSig.artists.forEach(a=>bump(tasteProfile.artists, a, 8));
  songSig.artists.forEach(a=>bump(tasteProfile.artists, a, 12));
  textSig.languages.forEach(l=>bump(tasteProfile.languages, l, 6));
  songSig.languages.forEach(l=>bump(tasteProfile.languages, l, 5));
  textSig.eras.forEach(e=>bump(tasteProfile.eras, e, 7));
  textSig.moods.forEach(m=>bump(tasteProfile.moods, m, 7));
  textSig.terms.forEach(t=>bump(tasteProfile.rawTerms, t, 3));

  // If artists were identified, also inherit their known era/mood/language —
  // this is the "Jabilli Kosam + Chiluka Kshemama -> SPB -> Telugu Classic Melody" leap.
  [...textSig.artists, ...songSig.artists].forEach(a=>{
    const info = ARTIST_GRAPH[a];
    if(info){
      bump(tasteProfile.languages, info.language, 4);
      bump(tasteProfile.eras, info.era, 4);
      bump(tasteProfile.moods, info.mood, 4);
    }
  });

  searchLog.unshift({query, ts:Date.now(), songIds:(songs||[]).slice(0,5).map(s=>s.id), songTitles:(songs||[]).slice(0,3).map(s=>cleanName(s.name))});
  searchLog = searchLog.slice(0,40);
  saveTasteState();
}

// Every PLAY action (clicking a card anywhere — home rails, search results,
// recommendation rails, Continue Listening, featured card, next/prev) teaches
// the engine too. Weighted lighter than an explicit search, since pressing
// play on something already shown to you is a softer signal than typing a
// query for it — but it still accumulates, so pure browse-and-play behavior
// builds a real taste profile even if the user never types a single search.
let isRestoringSession = false; // guard: restoring a saved session should not double-count
function recordPlaySignal(song){
  if(isRestoringSession || !song) return;
  const songSig = extractSongSignals([song], 5);
  songSig.artists.forEach(a=>bump(tasteProfile.artists, a, 5));
  songSig.languages.forEach(l=>bump(tasteProfile.languages, l, 3));
  songSig.artists.forEach(a=>{
    const info = ARTIST_GRAPH[a];
    if(info){
      bump(tasteProfile.languages, info.language, 2);
      bump(tasteProfile.eras, info.era, 2);
      bump(tasteProfile.moods, info.mood, 2);
    }
  });

  // The song's own title/album carries the same kind of mood/era/keyword
  // signal a typed search query would — e.g. clicking "Jabilli Kosam" directly
  // from a home rail (no typing involved) should still let words in its title
  // and era/mood keywords from its album name register, exactly like typing
  // "Jabilli Kosam" into the search box would. Without this, a song clicked
  // straight off the home feed only ever contributes its artist/language —
  // never its own title text — which is the gap being closed here.
  const titleText = `${song.name||''} ${song.album?.name||''}`;
  const titleSig = extractTextSignals(titleText);
  titleSig.eras.forEach(e=>bump(tasteProfile.eras, e, 3));
  titleSig.moods.forEach(m=>bump(tasteProfile.moods, m, 3));
  titleSig.languages.forEach(l=>bump(tasteProfile.languages, l, 2));
  titleSig.terms.forEach(t=>bump(tasteProfile.rawTerms, t, 2));
  // an artist named directly in the title/album text (rare, but covers cover
  // versions or compilation albums) gets the same treatment as a typed search
  titleSig.artists.forEach(a=>bump(tasteProfile.artists, a, 4));

  // ---- NEW FACTOR 1: time-of-day listening pattern ----
  // People often want different moods at different times (energetic in the
  // morning, melodic at night). This bucket learns that pattern purely from
  // when you actually press play — no typing required.
  const tod = timeOfDayLabel(new Date());
  bump(tasteProfile.timeOfDay, tod, 4);

  // ---- NEW FACTOR 2: artist co-occurrence within a session ----
  // If you play Artist A and then, a few songs later, Artist B, that's a soft
  // signal those two go together for you — even if neither is in the curated
  // ARTIST_GRAPH. This widens "You Might Like" beyond the hand-curated list.
  songSig.artists.forEach(a=>{
    recentArtistQueue.filter(prev=>prev!==a).forEach(prev=>{
      const key = [prev,a].sort().join('::');
      bump(tasteProfile.coOccurringArtists, key, 3);
    });
    recentArtistQueue.unshift(a);
    recentArtistQueue = recentArtistQueue.slice(0, RECENT_ARTIST_WINDOW);
  });

  // ---- Rich play-history entry (powers the History view) ----
  // Replay detection: if this exact song already has a recent entry, bump its
  // playCount and give it an extra taste-weight boost — repeat listening is
  // the single strongest taste signal a recsys can get, stronger than any
  // search or first-time click.
  const existing = playLog.find(p=>p.songId===song.id);
  if(existing){
    existing.playCount = (existing.playCount||1) + 1;
    songSig.artists.forEach(a=>bump(tasteProfile.artists, a, 6)); // replay bonus
    bump(tasteProfile.languages, songSig.languages[0], 3);
  }
  const now = new Date();
  playLog.unshift({
    songId: song.id,
    title: cleanName(song.name),
    artist: getArtist(song),
    img: getBestImg(song),
    ts: now.getTime(),
    dateLabel: formatHistoryDate(now),
    timeLabel: formatHistoryTime(now),
    completed: false, // flipped to true by recordCompletionSignal() if the song plays through
    playCount: existing ? existing.playCount : 1,
  });
  // dedupe: keep only the newest entry per song so History shows latest play time, not every repeat
  const seenHist = new Set();
  playLog = playLog.filter(p=>{ if(seenHist.has(p.songId)) return false; seenHist.add(p.songId); return true; });
  playLog = playLog.slice(0,150);
  saveTasteState();
}

// ---- NEW FACTOR 3: completion vs skip ----
// Called from onEnded() when a song actually plays through to the end — the
// strongest positive signal available, well above a mere click. Also called
// (with a smaller, skip-aware weight) when the user navigates away early.
function recordCompletionSignal(song, playedThroughFully){
  if(!song) return;
  const songSig = extractSongSignals([song], playedThroughFully?8:0);
  if(playedThroughFully){
    songSig.artists.forEach(a=>bump(tasteProfile.artists, a, 10)); // completion bonus, on top of the initial play-click weight
    songSig.languages.forEach(l=>bump(tasteProfile.languages, l, 5));
    songSig.artists.forEach(a=>{
      const info = ARTIST_GRAPH[a];
      if(info){
        bump(tasteProfile.languages, info.language, 3);
        bump(tasteProfile.eras, info.era, 3);
        bump(tasteProfile.moods, info.mood, 3);
      }
    });
    const entry = playLog.find(p=>p.songId===song.id);
    if(entry) entry.completed = true;
    saveTasteState();
  }
  // Skips are intentionally NOT a negative signal here — we don't subtract
  // weight anywhere in this engine (no decay, nothing ever goes down), so a
  // skip simply means "no completion bonus was earned," which already makes
  // it weigh less than a completed listen without needing to punish it.
}

function timeOfDayLabel(d){
  const h = d.getHours();
  if(h>=5 && h<12) return 'Morning';
  if(h>=12 && h<17) return 'Afternoon';
  if(h>=17 && h<21) return 'Evening';
  return 'Night';
}
function formatHistoryDate(d){
  const today = new Date();
  const yest = new Date(); yest.setDate(today.getDate()-1);
  const sameDay = (a,b)=>a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  if(sameDay(d,today)) return 'Today';
  if(sameDay(d,yest)) return 'Yesterday';
  return d.toLocaleDateString(undefined, {day:'numeric', month:'short', year: d.getFullYear()!==today.getFullYear() ? 'numeric' : undefined});
}
function formatHistoryTime(d){
  return d.toLocaleTimeString(undefined, {hour:'numeric', minute:'2-digit'});
}

function topEntries(bucket, n){
  return Object.entries(bucket).sort((a,b)=>b[1]-a[1]).slice(0,n).filter(([,v])=>v>1);
}

function hasSignal(){
  return Object.keys(tasteProfile.artists).length || Object.keys(tasteProfile.languages).length ||
         Object.keys(tasteProfile.eras).length || Object.keys(tasteProfile.moods).length;
}

// ---- Query generation: turn scored signals into NEW discovery queries ----
// This deliberately avoids ever re-issuing the literal searched title — the
// bad-algorithm failure mode ("Jabilli Kosam Remix / DJ / Slowed") — by always
// composing from the abstracted signal layer (artist/era/mood/language), never
// from the raw query string.
function buildRecommendationPlan(){
  const topArtists  = topEntries(tasteProfile.artists, 3).map(([k])=>k);
  const topLanguage = topEntries(tasteProfile.languages, 1).map(([k])=>k)[0];
  const topEra       = topEntries(tasteProfile.eras, 1).map(([k])=>k)[0];
  const topMood       = topEntries(tasteProfile.moods, 1).map(([k])=>k)[0];
  const topTimeOfDay  = topEntries(tasteProfile.timeOfDay, 1).map(([k])=>k)[0];
  const currentTimeOfDay = timeOfDayLabel(new Date());

  const plan = { rails: [], tastePills: [] };

  // "Because You Like {Artist}" — strongest, most specific rail
  const primaryArtist = topArtists.find(a=>ARTIST_GRAPH[a]) || topArtists[0];
  if(primaryArtist){
    plan.rails.push({
      key:'artist', title:`Because You Like ${primaryArtist}`,
      sub:'Built from artists you keep searching for and playing',
      queries:[ `${primaryArtist} hits`, `${primaryArtist} best songs`, `${primaryArtist} top songs` ],
    });
  }

  // "{Era} {Language} Melodies" — era+language combo rail
  if(topEra || topLanguage){
    const eraLabel = topEra || 'Classic';
    const langLabel = topLanguage || 'Telugu';
    plan.rails.push({
      key:'era', title:`${eraLabel} ${langLabel} ${topMood==='Melody'||!topMood?'Melodies':topMood}`,
      sub:`Matches the ${eraLabel.toLowerCase()} ${langLabel} sound you've been exploring`,
      queries:[
        `${eraLabel==='Classic'?'old':'new'} ${langLabel} ${topMood ? topMood.split('/')[0].toLowerCase() : 'melody'} songs`,
        `${langLabel} ${eraLabel.toLowerCase()} hits`,
        `${eraLabel==='Classic'?'90s':'2025'} ${langLabel} songs`,
      ],
    });
  }

  // "You Might Like" — related artists via BOTH the curated knowledge graph
  // AND the new coOccurringArtists factor (artists you happen to play close
  // together in real sessions, even if they're not in the hand-curated graph).
  // This makes the rail learn relationships the graph alone never could.
  const relatedSet = new Set();
  topArtists.forEach(a=>{ (ARTIST_GRAPH[a]?.related||[]).forEach(r=>{ if(!topArtists.includes(r)) relatedSet.add(r); }); });
  topEntries(tasteProfile.coOccurringArtists, 6).forEach(([pairKey])=>{
    const [a,b] = pairKey.split('::');
    if(topArtists.includes(a) && !topArtists.includes(b)) relatedSet.add(b);
    if(topArtists.includes(b) && !topArtists.includes(a)) relatedSet.add(a);
  });
  if(relatedSet.size){
    plan.rails.push({
      key:'related', title:'You Might Like',
      sub:'Listeners of your favorite artists also enjoy these',
      queries:[...relatedSet].slice(0,3).map(a=>`${a} hits`),
      perQueryLabel:true,
    });
  }

  // Mood rail as a lighter-weight tertiary rail when a mood signal is strong but
  // distinct from what era/artist rails already cover
  if(topMood && topMood!=='Melody'){
    plan.rails.push({
      key:'mood', title:`${topMood.split('/')[0]} Picks`,
      sub:`Tracking the ${topMood.toLowerCase()} mood in your recent searches`,
      queries:[ `${topLanguage||'telugu'} ${topMood.split('/')[0].toLowerCase()} songs`, `${topMood.split('/')[0].toLowerCase()} hits ${topLanguage||''}`.trim() ],
    });
  }

  // "Inspired By Your Searches" — uses the rawTerms bucket directly. This is
  // the catch-all that keeps every typed word contributing to recommendations,
  // even words that don't map to a known artist/language/era/mood keyword
  // (e.g. someone repeatedly searching "wedding songs" or a movie name).
  const topTerms = topEntries(tasteProfile.rawTerms, 4).map(([k])=>k);
  if(topTerms.length){
    plan.rails.push({
      key:'terms', title:'Inspired By Your Searches',
      sub:`Built from words you've searched: ${topTerms.slice(0,3).join(', ')}`,
      queries: topTerms.slice(0,3).map(t=>`${t} songs`),
    });
  }

  // "Right Now For You" — NEW: time-of-day rail. Only shown when the time
  // bucket you're in right now (Morning/Afternoon/Evening/Night) actually has
  // learned weight, so it doesn't fire with generic guesses on a first visit.
  if(topTimeOfDay && tasteProfile.timeOfDay[currentTimeOfDay] > 1){
    const todMoodWord = currentTimeOfDay==='Morning' ? 'fresh' : currentTimeOfDay==='Night' ? 'soothing' : currentTimeOfDay==='Evening' ? 'relaxing' : 'energetic';
    plan.rails.push({
      key:'timeofday', title:`Right Now For You — ${currentTimeOfDay}`,
      sub:`Based on what you usually play in the ${currentTimeOfDay.toLowerCase()}`,
      queries:[ `${topLanguage||'telugu'} ${todMoodWord} songs`, `${todMoodWord} ${topLanguage||'telugu'} hits` ],
    });
  }

  // taste pills for the little "what we learned" strip — now reflects ALL
  // weighted buckets: artist, language, era, mood, raw search terms,
  // time-of-day pattern, and artist co-occurrence.
  if(primaryArtist) plan.tastePills.push({label:primaryArtist, weight:tasteProfile.artists[primaryArtist]});
  if(topLanguage) plan.tastePills.push({label:topLanguage, weight:tasteProfile.languages[topLanguage]});
  if(topEra) plan.tastePills.push({label:topEra, weight:tasteProfile.eras[topEra]});
  if(topMood) plan.tastePills.push({label:topMood, weight:tasteProfile.moods[topMood]});
  topTerms.slice(0,2).forEach(t=>plan.tastePills.push({label:`"${t}"`, weight:tasteProfile.rawTerms[t]}));
  if(topTimeOfDay) plan.tastePills.push({label:`${topTimeOfDay} listener`, weight:tasteProfile.timeOfDay[topTimeOfDay]});
  const maxW = Math.max(1,...plan.tastePills.map(p=>p.weight));
  plan.tastePills.forEach(p=>p.pct = Math.min(100, Math.round((p.weight/maxW)*100)));

  return plan;
}

function fmt(s){if(isNaN(s)||s<0)return'0:00';const m=Math.floor(s/60),sc=Math.floor(s%60);return`${m}:${sc<10?'0':''}${sc}`;}
function esc(s){if(!s)return'';return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);}
function cleanName(n){if(!n)return'Untitled';return n.replace(/\(From [^)]*\)/gi,'').replace(/\[[^\]]*\]/gi,'').replace(/&quot;/g,'"').replace(/&#\d+;/g,'').replace(/\s{2,}/g,' ').trim();}
function getBestImg(song){if(song.image&&song.image.length){const lg=song.image.find(i=>i.quality==='500x500');return(lg||song.image[song.image.length-1])?.url||'';}return'';}
function getUrl(song,q){if(!song.downloadUrl||!song.downloadUrl.length)return null;const found=song.downloadUrl.find(i=>i.quality===`${q}kbps`);if(found&&found.url)return found.url;return[...song.downloadUrl].sort((a,b)=>(parseInt(b.quality)||0)-(parseInt(a.quality)||0))[0]?.url||null;}
function getArtist(song){return song.artists?.primary?.slice(0,2).map(a=>a.name).join(', ')||'Unknown Artist';}
function md3LoaderHTML(text){

        </div>
      </div>
      <p class="loader-text" id="md3LoaderText">${esc(text)}</p>
    </div>`;
}

function md3ShowError(text){

function addRipple(el){
  if(!el||el._rip)return;
  el._rip=true;
  const cs=getComputedStyle(el);
  if(cs.position==='static'){el.style.position='relative';}
  el.style.overflow='hidden';
  el.addEventListener('click',function(e){
    const r=el.getBoundingClientRect();
    const rp=document.createElement('span');
    rp.className='ripple-effect';
    const sz=Math.max(r.width,r.height)*2;
    const x=e.clientX-r.left-sz/2;
    const y=e.clientY-r.top-sz/2;
    rp.style.cssText=`width:${sz}px;height:${sz}px;left:${x}px;top:${y}px;`;
    el.appendChild(rp);
    setTimeout(()=>rp.remove(),600);
  });
}

    heart:'<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>',
  };

function loadAndPlay(song, list, idx){
  if(!song)return;
  currentSong = song;
  if(list) allSongsFlat = list;
  if(idx !== undefined) currentIndex = idx;

  // Every play — not just every search — teaches the taste engine.
  recordPlaySignal(song);

// AFTER
const url = getUrl(song, quality);
if(!url){
  lastFailedSong = { song, list: list||allSongsFlat, idx: idx!=null?idx:currentIndex };
  toast('No stream available — will retry when back online.');
  return;
}
lastFailedSong = null; // clear on any successful load

  if(audio){ audio.pause(); audio.removeEventListener('timeupdate',onTimeUpdate); audio.removeEventListener('loadedmetadata',onMeta); audio.removeEventListener('ended',onEnded); audio.src=''; }
  audio = new Audio(url);
  audio.volume = volumeLevel;
  audio.addEventListener('timeupdate', onTimeUpdate);
  audio.addEventListener('loadedmetadata', onMeta);
  audio.addEventListener('ended', onEnded);
  // AFTER
audio.play().then(()=>{ isPlaying=true; updatePlayIcons(true); }).catch(()=>{
  isPlaying=false; updatePlayIcons(false);
  lastFailedSong = { song, list: list||allSongsFlat, idx: idx!=null?idx:currentIndex };
});

  const name = cleanName(song.name);
  const img  = getBestImg(song);
  const art  = getArtist(song);

  mpThumb.src = img;
  mpTitle.textContent  = name;
  mpArtist.textContent = art;
  maxArt.src    = img;
  maxTitle.textContent  = name;
  maxArtist.textContent = art;
  maxBg.style.backgroundImage = `url(${img})`;
  miniPlayer.classList.add('visible');
  document.getElementById('orb3').style.opacity='1';

  toast(name,'music');

  document.querySelectorAll('.song-card.is-playing').forEach(c=>c.classList.remove('is-playing'));
  document.querySelectorAll(`[data-song-id="${song.id}"]`).forEach(c=>c.classList.add('is-playing'));

  // Update the address bar so the current song can be shared/copied directly
  try{
    const pageUrl = new URL(window.location.origin + window.location.pathname);
    pageUrl.searchParams.set('song', cleanName(song.name));
    pageUrl.searchParams.set('artist', getArtist(song).split(',')[0]);
    if(song.id) pageUrl.searchParams.set('id', song.id);
    history.replaceState({}, '', pageUrl.toString());
    document.title = `${cleanName(song.name)} — RhythmVerse`;
  }catch(e){ /* ignore URL update errors */ }

  document.querySelectorAll('.eq-bars').forEach(eq=>eq.classList.add('paused'));
  document.querySelectorAll(`[data-song-id="${song.id}"] .eq-bars`).forEach(eq=>eq.classList.remove('paused'));

  try{ localStorage.setItem(SK.song,JSON.stringify(song)); localStorage.setItem(SK.pos,'0'); }catch(e){}

  // Refresh personalized rails on the home screen — but debounced and only
  // when the top signal has actually changed, so clicking through several
  // songs in a row doesn't yank the grid out from under the user on every click.
  if(homeView.style.display !== 'none'){
    scheduleRecommendationRefresh();
  }
}

let recRefreshTimer = null;
let lastRecSignature = '';
function computeRecSignature(){
  return JSON.stringify([
    topEntries(tasteProfile.artists,3).map(e=>e[0]),
    topEntries(tasteProfile.languages,1).map(e=>e[0]),
    topEntries(tasteProfile.eras,1).map(e=>e[0]),
    topEntries(tasteProfile.moods,1).map(e=>e[0]),
    topEntries(tasteProfile.timeOfDay,1).map(e=>e[0]),
    topEntries(tasteProfile.coOccurringArtists,2).map(e=>e[0]),
  ]);
}
function scheduleRecommendationRefresh(){
  clearTimeout(recRefreshTimer);
  recRefreshTimer = setTimeout(()=>{
    const sig = computeRecSignature();
    if(sig === lastRecSignature) return; // nothing meaningful changed — skip the re-fetch
    lastRecSignature = sig;
    renderRecommendationZone();
  }, 1200);
}

function onTimeUpdate(){
  if(!audio||isNaN(audio.duration))return;
  const p=(audio.currentTime/audio.duration)*100;
  mpSlider.style.setProperty('--p',p+'%');
  maxSlider.style.setProperty('--p',p+'%');
  mpSlider.value  = p;
  maxSlider.value = p;
  mpCurrent.textContent  = fmt(audio.currentTime);
  maxCurrent.textContent = fmt(audio.currentTime);
  if(Math.floor(audio.currentTime)%5===0){
    try{ localStorage.setItem(SK.pos, audio.currentTime); }catch(e){}
  }
}

function onMeta(){
  if(!audio)return;
  mpTotal.textContent  = fmt(audio.duration);
  maxTotal.textContent = fmt(audio.duration);
  try{
    const saved = parseFloat(localStorage.getItem(SK.pos)||'0');
    if(saved>2 && saved<audio.duration-2){ audio.currentTime=saved; }
  }catch(e){}
}

function onEnded(){
  isPlaying=false;
  updatePlayIcons(false);
  // Song played all the way to the end — the strongest possible taste signal.
  recordCompletionSignal(currentSong, true);
  if(homeView.style.display !== 'none') scheduleRecommendationRefresh();
  if(isLoop){ audio.currentTime=0; audio.play().then(()=>{isPlaying=true;updatePlayIcons(true);}); return; }
  if(isRepeat && currentSong){ loadAndPlay(currentSong, null, currentIndex); return; }
  playNext();
}

function playNext(){
  if(!allSongsFlat.length)return;
  const ni = isShuffle ? Math.floor(Math.random()*allSongsFlat.length) : (currentIndex+1)%allSongsFlat.length;
  loadAndPlay(allSongsFlat[ni], null, ni);
}

function playPrev(){
  if(!allSongsFlat.length)return;
  if(audio && audio.currentTime>3){ audio.currentTime=0; return; }
  const pi = isShuffle ? Math.floor(Math.random()*allSongsFlat.length) : (currentIndex-1+allSongsFlat.length)%allSongsFlat.length;
  loadAndPlay(allSongsFlat[pi], null, pi);
}

function togglePlay(){
  if(!audio||!currentSong)return;
  if(isPlaying){
    audio.pause();
    isPlaying=false;
    updatePlayIcons(false);
  } else {
    audio.play().then(()=>{
      isPlaying=true;
      updatePlayIcons(true);
    }).catch(()=>{
      isPlaying=false;
      updatePlayIcons(false);
    });
  }
  document.querySelectorAll(`[data-song-id="${currentSong?.id}"] .eq-bars`).forEach(eq=>{
    isPlaying ? eq.classList.remove('paused') : eq.classList.add('paused');
  });
}

function seekTo(pct){
  if(!audio||!audio.duration)return;
  audio.currentTime=(pct/100)*audio.duration;
}

function changeQuality(q){
  if(!currentSong)return;
  quality=q; mpQuality.value=q; maxQuality.value=q;
  const t=audio?audio.currentTime:0;
  const was=isPlaying;
  const url=getUrl(currentSong,quality);
  if(!url)return;
  if(audio){ audio.pause(); audio.src=''; }
  audio=new Audio(url);
  audio.volume=volumeLevel;
  audio.addEventListener('timeupdate',onTimeUpdate);
  audio.addEventListener('loadedmetadata',()=>{ audio.currentTime=t; if(was) audio.play().then(()=>{isPlaying=true;updatePlayIcons(true);}); });
  audio.addEventListener('ended',onEnded);
  try{ localStorage.setItem(SK.qual,q); }catch(e){}
}

function setVolume(v){
  volumeLevel=v/100;
  if(audio) audio.volume=volumeLevel;
  mpVol.value=v; maxVol.value=v;
  const pct=v+'%';
  mpVol.style.setProperty('--vp',pct);
  maxVol.style.setProperty('--vp',pct);
  try{ localStorage.setItem(SK.vol,v); }catch(e){}
}

// =================================================================================
// API
// =================================================================================
async function fetchSongs(query){
  const r=await fetch(`${API}?query=${encodeURIComponent(query)}&limit=30`);
  if(!r.ok) throw new Error('Network error');
  const j=await r.json();
  if(!j.success||!j.data?.results) throw new Error('API error');
  const map=new Map();
  for(const s of j.data.results){ if(!map.has(s.id)) map.set(s.id,s); }
  return [...map.values()];
}

  });
